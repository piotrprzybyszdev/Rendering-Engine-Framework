name: Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install GLFW dependencies
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt install libwayland-dev libxkbcommon-dev xorg-dev

    - name: Install Vulkan SDK Windows
      uses: jakoch/install-vulkan-sdk-action@v1
      if: matrix.os == 'windows-latest'
      with:
        optional_components: com.lunarg.vulkan.debug

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      if: matrix.os != 'windows-latest'

    - name: Configure CMake
      run: cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}}
